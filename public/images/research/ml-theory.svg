<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)" rx="12"/>
  <!-- Neural Network -->
  <g transform="translate(30, 40)">
    <!-- Input layer -->
    <circle cx="30" cy="40" r="10" fill="#3B82F6" opacity="0.3" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="30" cy="80" r="10" fill="#3B82F6" opacity="0.3" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="30" cy="120" r="10" fill="#3B82F6" opacity="0.3" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="30" cy="160" r="10" fill="#3B82F6" opacity="0.3" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Hidden layer 1 -->
    <circle cx="110" cy="30" r="10" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="110" cy="70" r="10" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="110" cy="110" r="10" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="110" cy="150" r="10" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <circle cx="110" cy="190" r="10" fill="#7C3AED" opacity="0.3" stroke="#7C3AED" stroke-width="1.5"/>
    <!-- Hidden layer 2 -->
    <circle cx="190" cy="50" r="10" fill="#9B0000" opacity="0.3" stroke="#9B0000" stroke-width="1.5"/>
    <circle cx="190" cy="100" r="10" fill="#9B0000" opacity="0.3" stroke="#9B0000" stroke-width="1.5"/>
    <circle cx="190" cy="150" r="10" fill="#9B0000" opacity="0.3" stroke="#9B0000" stroke-width="1.5"/>
    <!-- Output -->
    <circle cx="270" cy="100" r="12" fill="#22C55E" opacity="0.3" stroke="#22C55E" stroke-width="2"/>
    <!-- Connections (sparse for clarity) -->
    <g opacity="0.15" stroke-width="1">
      <line x1="40" y1="40" x2="100" y2="30" stroke="#3B82F6"/><line x1="40" y1="40" x2="100" y2="70" stroke="#3B82F6"/>
      <line x1="40" y1="80" x2="100" y2="70" stroke="#3B82F6"/><line x1="40" y1="80" x2="100" y2="110" stroke="#3B82F6"/>
      <line x1="40" y1="120" x2="100" y2="110" stroke="#3B82F6"/><line x1="40" y1="120" x2="100" y2="150" stroke="#3B82F6"/>
      <line x1="40" y1="160" x2="100" y2="150" stroke="#3B82F6"/><line x1="40" y1="160" x2="100" y2="190" stroke="#3B82F6"/>
      <line x1="120" y1="30" x2="180" y2="50" stroke="#7C3AED"/><line x1="120" y1="70" x2="180" y2="50" stroke="#7C3AED"/>
      <line x1="120" y1="70" x2="180" y2="100" stroke="#7C3AED"/><line x1="120" y1="110" x2="180" y2="100" stroke="#7C3AED"/>
      <line x1="120" y1="150" x2="180" y2="150" stroke="#7C3AED"/><line x1="120" y1="190" x2="180" y2="150" stroke="#7C3AED"/>
      <line x1="200" y1="50" x2="258" y2="100" stroke="#9B0000"/><line x1="200" y1="100" x2="258" y2="100" stroke="#9B0000"/>
      <line x1="200" y1="150" x2="258" y2="100" stroke="#9B0000"/>
    </g>
  </g>
  <!-- Loss curve -->
  <g transform="translate(230, 145)">
    <rect width="150" height="110" rx="8" fill="white" stroke="#64748B" stroke-width="1.5"/>
    <text x="75" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748B" font-weight="600">Convergence</text>
    <!-- Axes -->
    <line x1="20" y1="90" x2="140" y2="90" stroke="#94A3B8" stroke-width="1"/>
    <line x1="20" y1="25" x2="20" y2="90" stroke="#94A3B8" stroke-width="1"/>
    <!-- Loss curve -->
    <path d="M25 30 Q40 35 55 55 Q70 68 85 75 Q100 80 115 82 Q125 83 135 83" stroke="#9B0000" stroke-width="2" fill="none"/>
    <!-- Faster convergence -->
    <path d="M25 30 Q35 45 45 65 Q55 78 65 82 Q75 84 85 84" stroke="#22C55E" stroke-width="2" fill="none" stroke-dasharray="4"/>
    <text x="130" y="80" font-family="Inter,sans-serif" font-size="7" fill="#9B0000">Standard</text>
    <text x="88" y="80" font-family="Inter,sans-serif" font-size="7" fill="#22C55E">Ours</text>
    <text x="80" y="104" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">Iterations</text>
  </g>
  <!-- Math formula -->
  <g transform="translate(40, 230)">
    <text x="0" y="15" font-family="serif" font-size="16" fill="#64748B" opacity="0.6">min</text>
    <text x="35" y="15" font-family="serif" font-size="14" fill="#64748B" opacity="0.5">f(x) = </text>
    <text x="85" y="15" font-family="serif" font-size="14" fill="#9B0000" opacity="0.5">L(w,b)</text>
    <text x="135" y="15" font-family="serif" font-size="14" fill="#64748B" opacity="0.5"> + </text>
    <text x="150" y="15" font-family="serif" font-size="14" fill="#7C3AED" opacity="0.5">λΩ(w)</text>
  </g>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#64748B" font-weight="600">Machine Learning Theory</text>
</svg>
