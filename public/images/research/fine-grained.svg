<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg5)" rx="12"/>
  <!-- Main image with zoom -->
  <g transform="translate(30, 40)">
    <rect width="150" height="120" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
    <!-- Image content - birds -->
    <circle cx="50" cy="50" r="15" fill="#2563EB" opacity="0.15"/>
    <circle cx="100" cy="45" r="12" fill="#2563EB" opacity="0.12"/>
    <circle cx="75" cy="85" r="18" fill="#2563EB" opacity="0.1"/>
    <!-- Detection boxes -->
    <rect x="32" y="32" width="36" height="36" rx="2" fill="none" stroke="#22C55E" stroke-width="2"/>
    <rect x="86" y="31" width="28" height="28" rx="2" fill="none" stroke="#EAB308" stroke-width="2"/>
    <rect x="55" y="65" width="40" height="40" rx="2" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <!-- Labels -->
    <rect x="32" y="28" width="36" height="10" rx="2" fill="#22C55E"/>
    <text x="50" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="white">Species A</text>
    <rect x="86" y="27" width="30" height="10" rx="2" fill="#EAB308"/>
    <text x="101" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="white">Species B</text>
  </g>
  <!-- Zoom magnifier -->
  <g transform="translate(200, 30)">
    <circle cx="60" cy="60" r="55" fill="white" stroke="#2563EB" stroke-width="2"/>
    <circle cx="60" cy="60" r="48" fill="#EFF6FF"/>
    <!-- Zoomed detail -->
    <circle cx="60" cy="55" r="25" fill="#2563EB" opacity="0.2"/>
    <!-- Fine features -->
    <line x1="45" y1="45" x2="50" y2="50" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
    <line x1="55" y1="42" x2="58" y2="48" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="43" x2="63" y2="49" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
    <line x1="70" y1="48" x2="67" y2="53" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
    <!-- Feature annotations -->
    <path d="M80 40 L95 30" stroke="#EF4444" stroke-width="1"/>
    <circle cx="80" cy="40" r="2" fill="#EF4444"/>
    <text x="97" y="32" font-family="Inter,sans-serif" font-size="7" fill="#EF4444">Feature 1</text>
    <path d="M45 70 L30 80" stroke="#22C55E" stroke-width="1"/>
    <circle cx="45" cy="70" r="2" fill="#22C55E"/>
    <text x="15" y="88" font-family="Inter,sans-serif" font-size="7" fill="#22C55E">Feature 2</text>
    <!-- Magnifier handle -->
    <line x1="100" y1="100" x2="120" y2="120" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Taxonomy tree -->
  <g transform="translate(100, 180)">
    <rect x="85" y="0" width="60" height="22" rx="4" fill="#2563EB" opacity="0.1" stroke="#2563EB" stroke-width="1"/>
    <text x="115" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#2563EB">Category</text>
    <line x1="100" y1="22" x2="60" y2="40" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <line x1="130" y1="22" x2="170" y2="40" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
    <rect x="30" y="40" width="60" height="18" rx="3" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="1"/>
    <text x="60" y="53" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#22C55E">Subclass A</text>
    <rect x="140" y="40" width="60" height="18" rx="3" fill="#EAB308" opacity="0.1" stroke="#EAB308" stroke-width="1"/>
    <text x="170" y="53" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#EAB308">Subclass B</text>
  </g>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#2563EB" font-weight="600">Fine-grained Image Recognition</text>
</svg>
