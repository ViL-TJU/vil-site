<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF2F2"/>
      <stop offset="1" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9B0000"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>
  <!-- Video frames -->
  <rect x="40" y="60" width="120" height="80" rx="8" fill="white" stroke="#9B0000" stroke-width="2" opacity="0.9"/>
  <rect x="50" y="70" width="100" height="50" rx="4" fill="#FEE2E2"/>
  <!-- Play button -->
  <polygon points="90,85 90,110 110,97" fill="#9B0000"/>
  <rect x="50" y="125" width="100" height="4" rx="2" fill="#9B0000" opacity="0.3"/>
  <rect x="50" y="125" width="40" height="4" rx="2" fill="#9B0000"/>
  <!-- Second frame -->
  <rect x="180" y="40" width="120" height="80" rx="8" fill="white" stroke="#DC2626" stroke-width="2" opacity="0.9"/>
  <rect x="190" y="50" width="100" height="50" rx="4" fill="#FEE2E2"/>
  <!-- Person silhouette -->
  <circle cx="240" cy="65" r="8" fill="#9B0000" opacity="0.6"/>
  <rect x="232" y="75" width="16" height="20" rx="4" fill="#9B0000" opacity="0.4"/>
  <!-- Tracking box -->
  <rect x="225" y="57" width="30" height="40" rx="2" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="4"/>
  <!-- Third frame -->
  <rect x="140" y="150" width="120" height="80" rx="8" fill="white" stroke="#9B0000" stroke-width="2" opacity="0.9"/>
  <rect x="150" y="160" width="100" height="50" rx="4" fill="#FEE2E2"/>
  <!-- Multiple targets -->
  <circle cx="175" cy="178" r="6" fill="#9B0000" opacity="0.5"/>
  <rect x="168" y="169" width="14" height="14" rx="1" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="215" cy="185" r="5" fill="#DC2626" opacity="0.5"/>
  <rect x="209" y="179" width="12" height="12" rx="1" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Connection arrows -->
  <path d="M160 120 L190 150" stroke="#9B0000" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <path d="M290 120 L260 150" stroke="#9B0000" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <!-- Neural network nodes -->
  <g transform="translate(300, 160)">
    <circle cx="0" cy="0" r="6" fill="#9B0000" opacity="0.3"/>
    <circle cx="40" cy="-20" r="6" fill="#9B0000" opacity="0.5"/>
    <circle cx="40" cy="20" r="6" fill="#9B0000" opacity="0.5"/>
    <circle cx="80" cy="0" r="6" fill="#9B0000" opacity="0.7"/>
    <line x1="6" y1="0" x2="34" y2="-20" stroke="#9B0000" stroke-width="1" opacity="0.3"/>
    <line x1="6" y1="0" x2="34" y2="20" stroke="#9B0000" stroke-width="1" opacity="0.3"/>
    <line x1="46" y1="-20" x2="74" y2="0" stroke="#9B0000" stroke-width="1" opacity="0.3"/>
    <line x1="46" y1="20" x2="74" y2="0" stroke="#9B0000" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#9B0000" font-weight="600">Video Content Analysis</text>
</svg>
