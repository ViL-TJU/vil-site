<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)" rx="12"/>
  <!-- Ancient painting/mural frame -->
  <g transform="translate(30, 35)">
    <rect width="160" height="120" rx="4" fill="#FEF3C7" stroke="#B45309" stroke-width="2.5"/>
    <rect x="8" y="8" width="144" height="104" rx="2" fill="#FFFBEB"/>
    <!-- Abstract mural elements -->
    <circle cx="40" cy="40" r="15" fill="#B45309" opacity="0.15"/>
    <circle cx="80" cy="50" r="20" fill="#9B0000" opacity="0.1"/>
    <path d="M30 80 Q50 60 70 80 Q90 100 110 80 Q130 60 145 75" stroke="#B45309" stroke-width="1.5" fill="none" opacity="0.4"/>
    <rect x="100" y="25" width="40" height="50" rx="2" fill="#B45309" opacity="0.08"/>
    <!-- Damage marks -->
    <circle cx="120" cy="70" r="6" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="2"/>
    <circle cx="55" cy="85" r="4" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="2"/>
    <text x="80" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#B45309">Cultural Relic</text>
  </g>
  <!-- Digital monitoring -->
  <g transform="translate(220, 30)">
    <rect width="150" height="90" rx="8" fill="white" stroke="#B45309" stroke-width="1.5"/>
    <text x="75" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#B45309" font-weight="600">Surface Monitor</text>
    <!-- Grid pattern -->
    <g opacity="0.3">
      <line x1="10" y1="35" x2="140" y2="35" stroke="#B45309" stroke-width="0.5"/>
      <line x1="10" y1="50" x2="140" y2="50" stroke="#B45309" stroke-width="0.5"/>
      <line x1="10" y1="65" x2="140" y2="65" stroke="#B45309" stroke-width="0.5"/>
      <line x1="40" y1="30" x2="40" y2="80" stroke="#B45309" stroke-width="0.5"/>
      <line x1="75" y1="30" x2="75" y2="80" stroke="#B45309" stroke-width="0.5"/>
      <line x1="110" y1="30" x2="110" y2="80" stroke="#B45309" stroke-width="0.5"/>
    </g>
    <!-- Data points -->
    <circle cx="40" cy="50" r="4" fill="#22C55E" opacity="0.6"/>
    <circle cx="75" cy="45" r="4" fill="#22C55E" opacity="0.6"/>
    <circle cx="110" cy="55" r="4" fill="#EAB308" opacity="0.6"/>
    <circle cx="120" cy="65" r="4" fill="#EF4444" opacity="0.6"/>
  </g>
  <!-- Dunhuang/Museum icons -->
  <g transform="translate(220, 140)">
    <rect width="150" height="80" rx="8" fill="white" stroke="#9B0000" stroke-width="1.5"/>
    <!-- Temple/pagoda icon -->
    <polygon points="295,30 270,55 320,55" fill="#9B0000" opacity="0.1" transform="translate(-220,-100)"/>
    <rect x="20" y="20" width="30" height="45" rx="2" fill="#9B0000" opacity="0.08"/>
    <polygon points="35,15 15,30 55,30" fill="#9B0000" opacity="0.15"/>
    <!-- Museum icon -->
    <rect x="80" y="25" width="50" height="35" rx="2" fill="#B45309" opacity="0.08"/>
    <rect x="85" y="30" width="8" height="25" rx="1" fill="#B45309" opacity="0.15"/>
    <rect x="97" y="30" width="8" height="25" rx="1" fill="#B45309" opacity="0.15"/>
    <rect x="109" y="30" width="8" height="25" rx="1" fill="#B45309" opacity="0.15"/>
    <rect x="78" y="22" width="54" height="5" rx="1" fill="#B45309" opacity="0.2"/>
    <text x="35" y="75" font-family="Inter,sans-serif" font-size="8" fill="#9B0000">Dunhuang</text>
    <text x="105" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#B45309">Hunan Museum</text>
  </g>
  <!-- Connection arrow -->
  <path d="M190 95 L220 75" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <path d="M190 95 L220 170" stroke="#9B0000" stroke-width="1.5" stroke-dasharray="4" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#B45309" font-weight="600">Digital Cultural Heritage</text>
</svg>
